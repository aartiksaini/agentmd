name: Nightly build

on:
  # Triggers the workflow every day at 9PM (CET).
  schedule:
    - cron: "0 22 * * *"
  # Allows manual triggering from the Actions tab.
  workflow_dispatch:

jobs:
  nightly-build-amd64:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        architecture: [amd64]
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}
      - name: Run Buildx
        run: docker buildx build --platform linux/${{matrix.architecture}} -t ghcr.io/${{ github.repository_owner }}/agent-nightly:arch-$(echo ${{matrix.architecture}} | tr / -)-$(echo $GITHUB_SHA | cut -c1-7) --push .
      - name: Create new and append to manifest
        run: docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/agent-nightly:$(echo $GITHUB_SHA | cut -c1-7) ghcr.io/${{ github.repository_owner }}/agent-nightly:arch-$(echo ${{matrix.architecture}} | tr / -)-$(echo $GITHUB_SHA | cut -c1-7)
  nightly-build-other:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        architecture: [arm64, arm/v7, arm/v6]
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}
      - name: Run Buildx
        run: docker buildx build --platform linux/${{matrix.architecture}} -t ghcr.io/${{ github.repository_owner }}/agent-nightly:arch-$(echo ${{matrix.architecture}} | tr / -)-$(echo $GITHUB_SHA | cut -c1-7) --push .
      - name: Create new and append to manifest
        run: docker buildx imagetools create --append -t ghcr.io/${{ github.repository_owner }}/agent-nightly:$(echo $GITHUB_SHA | cut -c1-7) ghcr.io/${{ github.repository_owner }}/agent-nightly:arch-$(echo ${{matrix.architecture}} | tr / -)-$(echo $GITHUB_SHA | cut -c1-7)
