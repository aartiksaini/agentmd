name: Build and push on merge to main

on:
  push:
    branches: [main]

env:
  REPO: ghcr.io/${{ github.repository_owner }}/agent

jobs:
  build-amd64:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: benjlevesque/short-sha@v2.1
        id: short-sha
        with:
          length: 7
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push amd64
        run: |
          docker build --provenance=false \
            --build-arg VERSION=${{ steps.short-sha.outputs.sha }} \
            -t $REPO:${{ steps.short-sha.outputs.sha }}-amd64 \
            -t $REPO:latest-amd64 \
            .
          docker push $REPO:${{ steps.short-sha.outputs.sha }}-amd64
          docker push $REPO:latest-amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.short-sha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: benjlevesque/short-sha@v2.1
        id: short-sha
        with:
          length: 7
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push arm64
        run: |
          docker build --provenance=false \
            --build-arg VERSION=${{ steps.short-sha.outputs.sha }} \
            -t $REPO:${{ steps.short-sha.outputs.sha }}-arm64 \
            -t $REPO:latest-arm64 \
            -f Dockerfile.arm64 \
            .
          docker push $REPO:${{ steps.short-sha.outputs.sha }}-arm64
          docker push $REPO:latest-arm64

  create-manifest:
    runs-on: ubuntu-24.04
    needs: [build-amd64, build-arm64]
    permissions:
      packages: write
    steps:
      - uses: benjlevesque/short-sha@v2.1
        id: short-sha
        with:
          length: 7
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push SHA manifest
        run: |
          docker manifest create $REPO:${{ steps.short-sha.outputs.sha }} \
            $REPO:${{ steps.short-sha.outputs.sha }}-amd64 \
            $REPO:${{ steps.short-sha.outputs.sha }}-arm64
          docker manifest push $REPO:${{ steps.short-sha.outputs.sha }}
      - name: Create and push latest manifest
        run: |
          docker manifest create $REPO:latest \
            $REPO:latest-amd64 \
            $REPO:latest-arm64
          docker manifest push $REPO:latest
